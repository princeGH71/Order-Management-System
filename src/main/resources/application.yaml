spring:
  application:
    name: order-management-api
    
  datasource:
    url: jdbc:postgresql://localhost:5432/orderdb
    username: postgres
    password: 1909
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  port:8085
  
